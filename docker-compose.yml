services:
  # ── PostgreSQL + pgvector ──────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag_pipeline
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Application ────────────────────────────────────────
  api:
    build:
      context: .
      target: dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://rag:rag@db:5432/rag_pipeline
      DATABASE_URL_SYNC: postgresql://rag:rag@db:5432/rag_pipeline
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - upload_data:/tmp/rag_uploads

volumes:
  pgdata:
  upload_data:
